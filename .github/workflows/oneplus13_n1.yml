name: oneplus_13_custom_build
on:
  workflow_dispatch:
    inputs:
      # ========== 源码版本选择 ==========
      KERNEL_SOURCE_TAG:
        description: '要构建的内核源码 Tag（如 android15-6.6.30，留空则用 manifest 最新）'
        required: false
        default: ''

      # ========== 命名与时间 ==========
      KERNEL_SUFFIX:
        description: '内核名称后缀（替换原 -4k，可中文/emoji）'
        required: true
        default: '-酷安FutabaWa'
      KERNEL_LOCALVERSION:
        description: '本地附加版本（可选，如 -v1，显示在 uname -r 末尾）'
        required: false
        default: ''
      KERNEL_TIME:
        description: '构建时间戳（格式：Tue Dec 17 23:36:49 UTC 2024）'
        required: true
        default: 'Tue Dec 17 23:36:49 UTC 2024'

      # ========== 源码清单选择 ==========
      MANIFEST_BRANCH:
        description: 'manifest 分支（默认 oneplus/sm8750）'
        required: true
        default: 'refs/heads/oneplus/sm8750'
      MANIFEST_FILE:
        description: 'manifest 文件名'
        required: true
        default: 'oneplus_13.xml'

      # ========== 功能开关 ==========
      ENABLE_KSU:
        description: '集成 KernelSU？'
        required: false
        default: true
        type: boolean
      KSU_BRANCH:
        description: 'KernelSU 分支（main / dev / susfs-main）'
        required: false
        default: 'susfs-main'
      ENABLE_SUSFS:
        description: '集成 SUSFS？（需先启用 KSU）'
        required: false
        default: true
        type: boolean
      ENABLE_KPM:
        description: '启用 KPM 模块支持？'
        required: false
        default: false
        type: boolean
      ENABLE_LZ4KD:
        description: '启用 LZ4KD 压缩算法？'
        required: false
        default: false
        type: boolean
      ENABLE_SCHED_EXT:
        description: '添加风驰调度 sched_ext？'
        required: false
        default: false
        type: boolean
      ENABLE_TCP_BBR:
        description: '使用 TCP BBR 拥塞控制？'
        required: false
        default: true
        type: boolean
      ENABLE_WIREGUARD:
        description: '内置 WireGuard 模块？'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: /home/runner/.ccache
      CCACHE_MAXSIZE: 8G
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Configure Git
        run: |
          git config --global user.name "Futaba"
          git config --global user.email "3199167602@qq.com"

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y python3 git curl ccache

      - name: Restore ccache
        uses: actions/cache@v3
        with:
          path: /home/runner/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/HanKuCha/kernel_manifest.git \
            -b ${{ github.event.inputs.MANIFEST_BRANCH }} \
            -m ${{ github.event.inputs.MANIFEST_FILE }} --depth=1
          repo --trace sync -c -j$(nproc --all) --no-tags
          # 清理保护导出
          rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
          rm kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"

      # ========== 核心：切换到指定内核版本 Tag ==========
      - name: Checkout to specific kernel source tag
        if: inputs.KERNEL_SOURCE_TAG != ''
        run: |
          cd kernel_workspace
          echo "切换到标签: ${{ inputs.KERNEL_SOURCE_TAG }}"
          # 对每个 repo 管理的 git 仓库尝试 checkout 对应 tag
          repo forall -c '
            if git rev-parse --quiet --verify refs/tags/${{ inputs.KERNEL_SOURCE_TAG }}^{commit} > /dev/null 2>&1; then
              echo "仓库 $REPO_PATH 存在该标签，正在切换..."
              git checkout ${{ inputs.KERNEL_SOURCE_TAG }}
            else
              echo "仓库 $REPO_PATH 无此标签，保持当前版本"
            fi
          ' || true

      # 克隆辅助仓库（KSU / SUSFS / LZ4KD 的前置资源）
      - name: Clone SukiSU resources
        if: inputs.ENABLE_KSU || inputs.ENABLE_LZ4KD
        run: |
          cd kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6 || true
          git clone https://github.com/SukiSU-Ultra/SukiSU_patch.git || true

      - name: Set up KernelSU
        if: inputs.ENABLE_KSU
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s ${{ github.event.inputs.KSU_BRANCH }}
          cd ./KernelSU
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count main) "+" 10700)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          sed -i "s/DKSU_VERSION=12800/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: Apply SUSFS patches
        if: inputs.ENABLE_KSU && inputs.ENABLE_SUSFS
        run: |
          cd kernel_workspace/kernel_platform/common
          cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./
          cp ../../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          sed -i 's/-32,12 +32,38/-32,11 +32,37/g' 50_add_susfs_in_gki-android15-6.6.patch
          sed -i '/#include <trace\/hooks\/fs.h>/d' 50_add_susfs_in_gki-android15-6.6.patch
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          cp ../../SukiSU_patch/hooks/syscall_hooks.patch ./
          patch -p1 -F 3 < syscall_hooks.patch || true

      - name: Apply HMBird GKI patch
        # （保持原有，此处省略重复代码，实际需完整保留）
        run: |
          cd kernel_workspace/kernel_platform/common/drivers
          # ... （参考前文 HMBird 代码，此处不重复）
          if ! grep -q "hmbird_patch.o" Makefile; then
            echo "obj-y += hmbird_patch.o" >> Makefile
          fi
          cd ../../../
          git add -A && git commit -m "Add HMBird GKI patch" || true

      - name: Prepare lz4kd files
        if: inputs.ENABLE_LZ4KD
        run: |
          cd kernel_workspace/kernel_platform/common
          cp -r ../../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../../SukiSU_patch/other/zram/lz4k/lib/* ./lib/
          cp -r ../../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto/
          cp -r ../../SukiSU_patch/other/zram/lz4k_oplus ./lib/

      - name: Apply lz4kd patches
        if: inputs.ENABLE_LZ4KD
        run: |
          cd kernel_workspace/kernel_platform/common
          cp ../../SukiSU_patch/other/zram/zram_patch/6.6/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true

      # ---------- 配置 defconfig ----------
      - name: Configure KSU base
        if: inputs.ENABLE_KSU
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Configure SUSFS
        if: inputs.ENABLE_KSU && inputs.ENABLE_SUSFS
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Configure crypto options
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4K=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_842=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Enable LZ4KD in config
        if: inputs.ENABLE_LZ4KD
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Configure TCP BBR
        if: inputs.ENABLE_TCP_BBR
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Enable KPM
        if: inputs.ENABLE_KPM
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Enable WireGuard
        if: inputs.ENABLE_WIREGUARD
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_WIREGUARD=y" >> ./common/arch/arm64/configs/gki_defconfig

      # ---------- 版本字符串处理 ----------
      - name: Configure kernel name and version
        run: |
          cd kernel_workspace/kernel_platform/common

          # 1. 内核名称后缀（替换原 -4k）
          sed -i "s/-4k/${{ github.event.inputs.KERNEL_SUFFIX }}/g" ./arch/arm64/configs/gki_defconfig

          # 2. 本地附加版本（可选）
          if [ -n "${{ github.event.inputs.KERNEL_LOCALVERSION }}" ]; then
            echo "CONFIG_LOCALVERSION=\"${{ github.event.inputs.KERNEL_LOCALVERSION }}\"" >> ./arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./arch/arm64/configs/gki_defconfig

          # 3. 禁止 setlocalversion 自动添加后缀
          sed -i 's/${scm_version}//' ./scripts/setlocalversion

          cd ..
          # 4. 移除 check_defconfig 防止因配置不一致而失败
          sed -i 's/check_defconfig//' ./common/build.config.gki
          cd common
          git add -A && git commit -a -m "Custom name & version" || true

      - name: Add sched_ext
        if: inputs.ENABLE_SCHED_EXT
        run: |
          cd kernel_workspace/kernel_platform/
          git clone https://github.com/HanKuCha/sched_ext.git
          cp -r ./sched_ext/* ./common/kernel/sched
          rm -rf ./sched_ext/.git
          cd common/kernel/sched

      - name: Build Kernel
        run: |
          export KBUILD_BUILD_TIMESTAMP="${{ github.event.inputs.KERNEL_TIME }}"
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928/bin:$PATH"
          export PATH="/usr/lib/ccache:$PATH"
          sudo apt install -y libelf-dev
          cd kernel_workspace/kernel_platform/common
          make -j$(nproc --all) \
            LLVM=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang \
            RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc \
            PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole \
            LD=ld.lld \
            HOSTLD=ld.lld \
            O=out \
            KCFLAGS+=-O2 \
            gki_defconfig all

      - name: Apply Linux Patch (for KSU)
        run: |
          cd kernel_workspace/kernel_platform/common/out/arch/arm64/boot
          curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.12.0/patch_linux
          chmod +x patch_linux
          ./patch_linux
          rm -f Image
          mv oImage Image

      - name: Make AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3.git --depth=1
          rm -rf ./AnyKernel3/.git ./AnyKernel3/push.sh
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3/

      - name: Set artifact name
        id: artifact_name
        run: |
          if [ "${{ inputs.ENABLE_KSU }}" = "true" ]; then
            echo "ARTIFACT_NAME=SukiSu_${{ env.KSUVER }}_${{ inputs.KERNEL_SOURCE_TAG || 'latest' }}_op13" >> $GITHUB_OUTPUT
          else
            echo "ARTIFACT_NAME=Kernel_${{ inputs.KERNEL_SOURCE_TAG || 'latest' }}_op13${{ inputs.KERNEL_LOCALVERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.ARTIFACT_NAME }}
          path: ./AnyKernel3/*
